<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stats Viewer</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #18223f;
      --text: #e8ecf8;
      --muted: #9aa7c7;
      --accent: #67b7ff;
      --border: #2b3557;
      --good: #8be28b;
      --warn: #ffd166;
      --bad: #ff8b8b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #09101e, #10172b 45%, #0c1220);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(18, 26, 48, 0.96);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.7fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: linear-gradient(180deg, #2d74ff, #1f59cc);
      border: none;
      font-weight: 700;
      min-width: 120px;
    }

    button.secondary {
      background: var(--panel-2);
      border: 1px solid var(--border);
      font-weight: 600;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
    }

    .status.good { color: var(--good); }
    .status.warn { color: var(--warn); }
    .status.bad { color: var(--bad); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .stat-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .stat-card .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 26px;
      font-weight: 800;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.3fr 1fr 160px 180px;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: rgba(255,255,255,0.03);
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
    }

    tr:hover td {
      background: rgba(255,255,255,0.03);
    }

    .table-wrap {
      overflow: auto;
      max-height: 65vh;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(103, 183, 255, 0.14);
      color: #bfe0ff;
      font-size: 12px;
      border: 1px solid rgba(103, 183, 255, 0.25);
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      .grid, .toolbar, .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Live Stats Viewer</h1>
    <div class="sub">Fetches the source page only when you ask for it. No local database, no saved copy.</div>

    <div class="panel">
      <div class="grid">
        <div>
          <label for="statsUrl">Stats URL</label>
          <input id="statsUrl" value="https://stats.sharksice.timetoscore.com/display-league-stats?stat_class=1&league=1&season=74&level=233&conf=0" />
        </div>
        <div>
          <label for="proxyPrefix">Proxy endpoint</label>
          <input id="proxyPrefix" value="https://go.x2u.in/proxy?email=chris@wegotitems.com&apiKey=c915719b&url=" placeholder="https://go.x2u.in/proxy?email=...&apiKey=...&url=" />
        </div>
        <div>
          <label for="sectionToggle">Default section</label>
          <select id="sectionToggle">
            <option value="players">Players</option>
            <option value="goalies">Goalies</option>
            <option value="both">Both</option>
          </select>
        </div>
        <div>
          <button id="loadBtn">Load Live Data</button>
        </div>
      </div>
      <div class="row" style="margin-top:12px; justify-content:space-between;">
        <div id="status" class="status">Ready.</div>
        <div class="small">Uses the configured proxy endpoint to fetch live HTML on demand. No stats are stored locally.</div>
      </div>
      <div class="stats-grid" id="summaryCards"></div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <div>
          <label for="searchInput">Search player / team</label>
          <input id="searchInput" placeholder="Type a player or team name" />
        </div>
        <div>
          <label for="teamFilter">Team</label>
          <select id="teamFilter"><option value="">All teams</option></select>
        </div>
        <div>
          <label for="minGp">Min GP</label>
          <input id="minGp" type="number" min="0" value="0" />
        </div>
        <div>
          <label for="viewMode">View</label>
          <select id="viewMode">
            <option value="players">Players</option>
            <option value="goalies">Goalies</option>
            <option value="both">Both</option>
          </select>
        </div>
      </div>
    </div>

    <div id="playersSection" class="panel">
      <div class="section-head">
        <div>
          <h2 style="margin:0 0 6px;">Player Stats</h2>
          <div class="small" id="playersMeta"></div>
        </div>
        <span class="pill" id="playersCount">0 rows</span>
      </div>
      <div class="table-wrap">
        <table id="playersTable"></table>
      </div>
    </div>

    <div id="goaliesSection" class="panel">
      <div class="section-head">
        <div>
          <h2 style="margin:0 0 6px;">Goalie Stats</h2>
          <div class="small" id="goaliesMeta"></div>
        </div>
        <span class="pill" id="goaliesCount">0 rows</span>
      </div>
      <div class="table-wrap">
        <table id="goaliesTable"></table>
      </div>
    </div>
  </div>
<script>
const state = {
  players: [],
  goalies: [],
  sort: {
    players: { key: 'Pts', dir: 'desc' },
    goalies: { key: 'Save %', dir: 'desc' }
  },
  lastLoadedAt: null,
  sourceUrl: ''
};

const playerColumns = ['Name', '#', 'Team', 'GP', 'Goals', 'Ass.', 'Hat', 'Min', 'Pts/Game', 'Pts'];
const goalieColumns = ['Name', 'Team', 'GP', 'Shots', 'GA', 'GAA', 'Save %', 'SO'];

const els = {
  statsUrl: document.getElementById('statsUrl'),
  proxyUrl: document.getElementById('proxyUrl'),
  loadBtn: document.getElementById('loadBtn'),
  status: document.getElementById('status'),
  summaryCards: document.getElementById('summaryCards'),
  searchInput: document.getElementById('searchInput'),
  teamFilter: document.getElementById('teamFilter'),
  minGp: document.getElementById('minGp'),
  viewMode: document.getElementById('viewMode'),
  sectionToggle: document.getElementById('sectionToggle'),
  playersSection: document.getElementById('playersSection'),
  goaliesSection: document.getElementById('goaliesSection'),
  playersTable: document.getElementById('playersTable'),
  goaliesTable: document.getElementById('goaliesTable'),
  playersCount: document.getElementById('playersCount'),
  goaliesCount: document.getElementById('goaliesCount'),
  playersMeta: document.getElementById('playersMeta'),
  goaliesMeta: document.getElementById('goaliesMeta')
};

let aborter = null;

function setStatus(text, kind) {
  els.status.textContent = text;
  els.status.className = ('status ' + (kind || '')).trim();
}

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => {
      setTimeout(() => reject(new Error(label + ' timed out after ' + ms + 'ms')), ms);
    })
  ]);
}

function toNumber(value) {
  if (!value) return 0;
  const num = Number(String(value).replace(/[^0-9.-]/g, ''));
  return Number.isFinite(num) ? num : 0;
}

function normalizeWhitespace(str) {
  return String(str || '').replace(/\s+/g, ' ').trim();
}

function buildProxyRequestUrl(rawUrl) {
  const base = (els.proxyUrl.value || '').trim();
  if (!base) throw new Error('Enter a proxy endpoint');
  return base + encodeURIComponent(rawUrl);
}

async function corsFreeText(url, signal) {
  setStatus('Loading via proxy...', 'warn');

  const r = await withTimeout(fetch(url, {
    method: 'GET',
    signal,
    headers: { 'Accept': 'text/html' },
    cache: 'no-store'
  }), 12000, 'Proxy fetch');

  if (!r.ok) throw new Error('Request failed ' + r.status);

  setStatus('Reading response...', 'warn');
  return await r.text();
}

/* ---------- NEW TABLE PARSER ---------- */

function parseStatsPage(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const tables = Array.from(doc.querySelectorAll('table'));

  const players = [];
  const goalies = [];

  tables.forEach(table => {
    const text = normalizeWhitespace(table.innerText);

    if (text.includes('Pts/Game') && text.includes('Goals')) {
      players.push(...parsePlayerTable(table));
    }

    if (text.includes('Save %') && text.includes('GAA')) {
      goalies.push(...parseGoalieTable(table));
    }
  });

  return { players, goalies };
}

function parsePlayerTable(table) {
  const rows = [];
  const trs = table.querySelectorAll('tr');

  trs.forEach(tr => {
    const cells = Array.from(tr.querySelectorAll('td')).map(td => normalizeWhitespace(td.textContent));

    if (cells.length < 10) return;
    if (!/^\d+(\.\d+)?$/.test(cells[cells.length - 1])) return;

    rows.push({
      Name: cells[0],
      '#': cells[1],
      Team: cells[2],
      GP: toNumber(cells[3]),
      Goals: toNumber(cells[4]),
      'Ass.': toNumber(cells[5]),
      Hat: toNumber(cells[6]),
      Min: toNumber(cells[7]),
      'Pts/Game': toNumber(cells[8]),
      Pts: toNumber(cells[9])
    });
  });

  return rows;
}

function parseGoalieTable(table) {
  const rows = [];
  const trs = table.querySelectorAll('tr');

  trs.forEach(tr => {
    const cells = Array.from(tr.querySelectorAll('td')).map(td => normalizeWhitespace(td.textContent));

    if (cells.length < 8) return;
    if (!/^\d+(\.\d+)?$/.test(cells[cells.length - 1])) return;

    rows.push({
      Name: cells[0],
      Team: cells[1],
      GP: toNumber(cells[2]),
      Shots: toNumber(cells[3]),
      GA: toNumber(cells[4]),
      GAA: toNumber(cells[5]),
      'Save %': toNumber(cells[6]),
      SO: toNumber(cells[7])
    });
  });

  return rows;
}

/* ---------- LOAD ---------- */

async function loadData() {
  const rawUrl = els.statsUrl.value.trim();
  if (!rawUrl) return;

  aborter?.abort();
  aborter = new AbortController();

  try {
    const url = buildProxyRequestUrl(rawUrl);
    const html = await corsFreeText(url, aborter.signal);

    setStatus('Parsing...', 'warn');

    const parsed = parseStatsPage(html);

    state.players = parsed.players;
    state.goalies = parsed.goalies;
    state.lastLoadedAt = new Date();

    setStatus('Loaded ' + state.players.length + ' players / ' + state.goalies.length + ' goalies', 'good');

    console.log('players', state.players);
    console.log('goalies', state.goalies);

  } catch (err) {
    console.error(err);
    setStatus('Error: ' + err.message, 'bad');
  }
}

/* ---------- INIT ---------- */

els.loadBtn.addEventListener('click', loadData);
setStatus('Ready (proxy mode)', 'good');
</script>
  

</body>
</html>
