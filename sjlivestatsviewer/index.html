<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Stats Viewer</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #18223f;
      --text: #e8ecf8;
      --muted: #9aa7c7;
      --accent: #67b7ff;
      --border: #2b3557;
      --good: #8be28b;
      --warn: #ffd166;
      --bad: #ff8b8b;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #09101e, #10172b 45%, #0c1220);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .panel {
      background: rgba(18, 26, 48, 0.96);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.7fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 11px 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: linear-gradient(180deg, #2d74ff, #1f59cc);
      border: none;
      font-weight: 700;
      min-width: 120px;
    }

    button.secondary {
      background: var(--panel-2);
      border: 1px solid var(--border);
      font-weight: 600;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .status {
      font-size: 14px;
      color: var(--muted);
    }

    .status.good { color: var(--good); }
    .status.warn { color: var(--warn); }
    .status.bad { color: var(--bad); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .stat-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }

    .stat-card .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 26px;
      font-weight: 800;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.3fr 1fr 160px 180px;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: rgba(255,255,255,0.03);
      position: sticky;
      top: 0;
      cursor: pointer;
      user-select: none;
    }

    tr:hover td {
      background: rgba(255,255,255,0.03);
    }

    .table-wrap {
      overflow: auto;
      max-height: 65vh;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(103, 183, 255, 0.14);
      color: #bfe0ff;
      font-size: 12px;
      border: 1px solid rgba(103, 183, 255, 0.25);
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    .hidden { display: none; }

    @media (max-width: 980px) {
      .grid, .toolbar, .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Live Stats Viewer</h1>
    <div class="sub">Fetches the source page only when you ask for it. No local database, no saved copy.</div>

    <div class="panel">
      <div class="grid">
        <div>
          <label for="statsUrl">Stats URL</label>
          <input id="statsUrl" value="https://stats.sharksice.timetoscore.com/display-league-stats?stat_class=1&league=1&season=74&level=233&conf=0" />
        </div>
        <div>
          <label for="proxyPrefix">Proxy endpoint</label>
          <input id="proxyPrefix" value="https://go.x2u.in/proxy?email=chris@wegotitems.com&apiKey=c915719b&url=" placeholder="https://go.x2u.in/proxy?email=...&apiKey=...&url=" />
        </div>
        <div>
          <label for="sectionToggle">Default section</label>
          <select id="sectionToggle">
            <option value="players">Players</option>
            <option value="goalies">Goalies</option>
            <option value="both">Both</option>
          </select>
        </div>
        <div>
          <button id="loadBtn">Load Live Data</button>
        </div>
      </div>
      <div class="row" style="margin-top:12px; justify-content:space-between;">
        <div id="status" class="status">Ready.</div>
        <div class="small">Uses the configured proxy endpoint to fetch live HTML on demand. No stats are stored locally.</div>
      </div>
      <div class="stats-grid" id="summaryCards"></div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <div>
          <label for="searchInput">Search player / team</label>
          <input id="searchInput" placeholder="Type a player or team name" />
        </div>
        <div>
          <label for="teamFilter">Team</label>
          <select id="teamFilter"><option value="">All teams</option></select>
        </div>
        <div>
          <label for="minGp">Min GP</label>
          <input id="minGp" type="number" min="0" value="0" />
        </div>
        <div>
          <label for="viewMode">View</label>
          <select id="viewMode">
            <option value="players">Players</option>
            <option value="goalies">Goalies</option>
            <option value="both">Both</option>
          </select>
        </div>
      </div>
    </div>

    <div id="playersSection" class="panel">
      <div class="section-head">
        <div>
          <h2 style="margin:0 0 6px;">Player Stats</h2>
          <div class="small" id="playersMeta"></div>
        </div>
        <span class="pill" id="playersCount">0 rows</span>
      </div>
      <div class="table-wrap">
        <table id="playersTable"></table>
      </div>
    </div>

    <div id="goaliesSection" class="panel">
      <div class="section-head">
        <div>
          <h2 style="margin:0 0 6px;">Goalie Stats</h2>
          <div class="small" id="goaliesMeta"></div>
        </div>
        <span class="pill" id="goaliesCount">0 rows</span>
      </div>
      <div class="table-wrap">
        <table id="goaliesTable"></table>
      </div>
    </div>
  </div>
<script>
const state = {
  players: [],
  goalies: [],
  sort: {
    players: { key: 'Pts', dir: 'desc' },
    goalies: { key: 'Save %', dir: 'desc' }
  },
  lastLoadedAt: null,
  sourceUrl: ''
};

const playerColumns = ['Name', '#', 'Team', 'GP', 'Goals', 'Ass.', 'Hat', 'Min', 'Pts/Game', 'Pts'];
const goalieColumns = ['Name', 'Team', 'GP', 'Shots', 'GA', 'GAA', 'Save %', 'SO'];

const els = {
  statsUrl: document.getElementById('statsUrl'),
  proxyPrefix: document.getElementById('proxyPrefix'),
  loadBtn: document.getElementById('loadBtn'),
  status: document.getElementById('status'),
  summaryCards: document.getElementById('summaryCards'),
  searchInput: document.getElementById('searchInput'),
  teamFilter: document.getElementById('teamFilter'),
  minGp: document.getElementById('minGp'),
  viewMode: document.getElementById('viewMode'),
  sectionToggle: document.getElementById('sectionToggle'),
  playersSection: document.getElementById('playersSection'),
  goaliesSection: document.getElementById('goaliesSection'),
  playersTable: document.getElementById('playersTable'),
  goaliesTable: document.getElementById('goaliesTable'),
  playersCount: document.getElementById('playersCount'),
  goaliesCount: document.getElementById('goaliesCount'),
  playersMeta: document.getElementById('playersMeta'),
  goaliesMeta: document.getElementById('goaliesMeta')
};

let aborter = null;

function setStatus(text, kind) {
  els.status.textContent = text;
  els.status.className = ('status ' + (kind || '')).trim();
}

function withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => {
      setTimeout(() => reject(new Error(label + ' timed out after ' + ms + 'ms')), ms);
    })
  ]);
}

function toNumber(value) {
  if (value === null || value === undefined) return 0;
  const cleaned = String(value).replace(/[^0-9.-]/g, '');
  const num = Number(cleaned);
  return Number.isFinite(num) ? num : 0;
}

function normalizeWhitespace(str) {
  return String(str || '').replace(/\u00A0/g, ' ').replace(/\s+/g, ' ').trim();
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getFetchUrl(rawUrl, proxyPrefix) {
  if (!proxyPrefix) return rawUrl;
  return proxyPrefix + encodeURIComponent(rawUrl);
}

async function corsFreeText(url, abortSignal) {
  setStatus('Loading via proxy...', 'warn');

  const r = await withTimeout(fetch(url, {
    method: 'GET',
    signal: abortSignal,
    headers: { 'Accept': 'text/html, text/plain, */*' },
    cache: 'no-store',
    credentials: 'omit'
  }), 12000, 'Proxy fetch');

  if (!r.ok) {
    throw new Error('Request failed with ' + r.status);
  }

  setStatus('Reading response text...', 'warn');
  return await withTimeout(r.text(), 8000, 'Response text read');
}

function parseStatsPage(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const tables = Array.from(doc.querySelectorAll('table'));

  const players = [];
  const goalies = [];

  tables.forEach(function(table) {
    const text = normalizeWhitespace(table.innerText || table.textContent || '');

    if (text.includes('Pts/Game') && text.includes('Goals')) {
      players.push.apply(players, parsePlayerTable(table));
    }

    if (text.includes('Save %') && text.includes('GAA')) {
      goalies.push.apply(goalies, parseGoalieTable(table));
    }
  });

  return {
    players: dedupeRows(players, playerColumns),
    goalies: dedupeRows(goalies, goalieColumns)
  };
}

function parsePlayerTable(table) {
  const rows = [];

  table.querySelectorAll('tr').forEach(function(tr) {
    const cells = Array.from(tr.querySelectorAll('td')).map(function(td) {
      return normalizeWhitespace(td.textContent);
    });

    if (cells.length < 10) return;
    if (!cells[9] || isNaN(toNumber(cells[9]))) return;

    rows.push({
      Name: cells[0] || '',
      '#': cells[1] || '',
      Team: cells[2] || '',
      GP: toNumber(cells[3]),
      Goals: toNumber(cells[4]),
      'Ass.': toNumber(cells[5]),
      Hat: toNumber(cells[6]),
      Min: toNumber(cells[7]),
      'Pts/Game': toNumber(cells[8]),
      Pts: toNumber(cells[9])
    });
  });

  return rows;
}

function parseGoalieTable(table) {
  const rows = [];

  table.querySelectorAll('tr').forEach(function(tr) {
    const cells = Array.from(tr.querySelectorAll('td')).map(function(td) {
      return normalizeWhitespace(td.textContent);
    });

    if (cells.length < 8) return;
    if (!cells[6] || isNaN(toNumber(cells[6]))) return;

    rows.push({
      Name: cells[0] || '',
      Team: cells[1] || '',
      GP: toNumber(cells[2]),
      Shots: toNumber(cells[3]),
      GA: toNumber(cells[4]),
      GAA: toNumber(cells[5]),
      'Save %': toNumber(cells[6]),
      SO: toNumber(cells[7])
    });
  });

  return rows;
}

function dedupeRows(rows, columns) {
  const seen = new Set();
  return rows.filter(function(row) {
    const key = columns.map(function(col) {
      return row[col];
    }).join('|');

    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function populateTeamFilter() {
  const teams = Array.from(new Set(
    state.players.concat(state.goalies).map(function(r) {
      return r.Team;
    }).filter(Boolean)
  )).sort();

  const current = els.teamFilter.value;

  els.teamFilter.innerHTML =
    '<option value="">All teams</option>' +
    teams.map(function(team) {
      return '<option value="' + escapeHtml(team) + '">' + escapeHtml(team) + '</option>';
    }).join('');

  if (teams.includes(current)) {
    els.teamFilter.value = current;
  }
}

function getFilteredRows(rows) {
  const q = els.searchInput.value.trim().toLowerCase();
  const team = els.teamFilter.value;
  const minGp = toNumber(els.minGp.value);

  return rows.filter(function(row) {
    const hay = (row.Name + ' ' + row.Team).toLowerCase();
    const matchesSearch = !q || hay.includes(q);
    const matchesTeam = !team || row.Team === team;
    const matchesGp = (row.GP || 0) >= minGp;
    return matchesSearch && matchesTeam && matchesGp;
  });
}

function sortRows(rows, group) {
  const key = state.sort[group].key;
  const dir = state.sort[group].dir;
  const multiplier = dir === 'asc' ? 1 : -1;

  return rows.slice().sort(function(a, b) {
    const av = a[key];
    const bv = b[key];

    if (typeof av === 'number' && typeof bv === 'number') {
      return (av - bv) * multiplier;
    }

    return String(av).localeCompare(String(bv)) * multiplier;
  });
}

function setSort(group, key) {
  const current = state.sort[group];
  if (current.key === key) {
    current.dir = current.dir === 'asc' ? 'desc' : 'asc';
  } else {
    current.key = key;
    current.dir = 'desc';
  }
  renderAll();
}

function renderTable(tableEl, columns, rows, group) {
  const sortState = state.sort[group];

  const thead =
    '<thead><tr>' +
    columns.map(function(col) {
      const active = sortState.key === col;
      const arrow = active ? (sortState.dir === 'asc' ? ' ▲' : ' ▼') : '';
      return '<th data-group="' + group + '" data-key="' + escapeHtml(col) + '">' + escapeHtml(col) + arrow + '</th>';
    }).join('') +
    '</tr></thead>';

  const tbody =
    '<tbody>' +
    rows.map(function(row) {
      return '<tr>' + columns.map(function(col) {
        return '<td>' + escapeHtml(row[col] == null ? '' : row[col]) + '</td>';
      }).join('') + '</tr>';
    }).join('') +
    '</tbody>';

  tableEl.innerHTML = thead + tbody;
}

function renderSummary() {
  const playerRows = getFilteredRows(state.players);
  const goalieRows = getFilteredRows(state.goalies);
  const topScorer = playerRows.slice().sort(function(a, b) { return b.Pts - a.Pts; })[0];
  const topGoalie = goalieRows.slice().sort(function(a, b) { return b['Save %'] - a['Save %']; })[0];

  const cards = [
    { label: 'Players visible', value: playerRows.length },
    { label: 'Goalies visible', value: goalieRows.length },
    { label: 'Top scorer', value: topScorer ? topScorer.Name + ' (' + topScorer.Pts + ')' : '—' },
    { label: 'Top save %', value: topGoalie ? topGoalie.Name + ' (' + topGoalie['Save %'] + ')' : '—' }
  ];

  els.summaryCards.innerHTML = cards.map(function(card) {
    const size = String(card.value).length > 18 ? '18px' : '26px';
    return (
      '<div class="stat-card">' +
        '<div class="label">' + escapeHtml(card.label) + '</div>' +
        '<div class="value" style="font-size:' + size + '">' + escapeHtml(card.value) + '</div>' +
      '</div>'
    );
  }).join('');
}

function syncViewMode() {
  const mode = els.viewMode.value || els.sectionToggle.value;
  els.playersSection.classList.toggle('hidden', mode === 'goalies');
  els.goaliesSection.classList.toggle('hidden', mode === 'players');
}

function attachHeaderEvents() {
  document.querySelectorAll('th[data-group]').forEach(function(th) {
    th.onclick = function() {
      setSort(th.dataset.group, th.dataset.key);
    };
  });
}

function renderAll() {
  const playerRows = sortRows(getFilteredRows(state.players), 'players');
  const goalieRows = sortRows(getFilteredRows(state.goalies), 'goalies');

  renderTable(els.playersTable, playerColumns, playerRows, 'players');
  renderTable(els.goaliesTable, goalieColumns, goalieRows, 'goalies');

  els.playersCount.textContent = playerRows.length + ' rows';
  els.goaliesCount.textContent = goalieRows.length + ' rows';

  const loaded = state.lastLoadedAt ? state.lastLoadedAt.toLocaleString() : 'Not loaded yet';
  els.playersMeta.textContent = 'Source: ' + (state.sourceUrl || '—') + ' | Last loaded: ' + loaded;
  els.goaliesMeta.textContent = 'Source: ' + (state.sourceUrl || '—') + ' | Last loaded: ' + loaded;

  renderSummary();
  attachHeaderEvents();
  syncViewMode();
}

async function loadData() {
  const rawUrl = els.statsUrl.value.trim();
  if (!rawUrl) {
    setStatus('Enter a stats URL first.', 'bad');
    return;
  }

  if (aborter) aborter.abort();
  aborter = new AbortController();

  setStatus('Starting live request...', 'warn');
  state.sourceUrl = rawUrl;

  try {
    const proxyPrefix = (els.proxyPrefix.value || '').trim();
    const requestUrl = getFetchUrl(rawUrl, proxyPrefix);
    const html = await corsFreeText(requestUrl, aborter.signal);

    setStatus('Parsing stats page...', 'warn');

    const parsed = parseStatsPage(html);
    state.players = parsed.players;
    state.goalies = parsed.goalies;
    state.lastLoadedAt = new Date();

    populateTeamFilter();
    syncViewMode();
    renderAll();

    setStatus('Loaded ' + state.players.length + ' player rows and ' + state.goalies.length + ' goalie rows.', 'good');
  } catch (error) {
    console.error(error);
    setStatus('Could not load the page. ' + error.message, 'bad');
  }
}

els.loadBtn.addEventListener('click', loadData);
els.searchInput.addEventListener('input', renderAll);
els.teamFilter.addEventListener('change', renderAll);
els.minGp.addEventListener('input', renderAll);
els.viewMode.addEventListener('change', syncViewMode);
els.sectionToggle.addEventListener('change', function() {
  els.viewMode.value = els.sectionToggle.value;
  syncViewMode();
});

setStatus('Ready.', 'good');
renderAll();
</script>
  

</body>
</html>
