<!DOCTYPE html>
<html>
<head>
  <title>Stats Viewer</title>
  <style>
    body { font-family: Arial; background:#111; color:#eee; padding:20px }
    input, button { padding:8px; margin:5px; }
    table { border-collapse: collapse; margin-top:20px }
    td, th { border:1px solid #444; padding:6px }
    th { background:#222 }
  </style>
</head>
<body>

<h2>Sharks Ice Stats Viewer</h2>

<div>
  <input id="statsUrl" size="80"
    value="https://stats.sharksice.timetoscore.com/display-league-stats?stat_class=1&league=1&season=74&level=233&conf=0" />
</div>

<div>
  <input id="proxyPrefix" size="80"
    value="https://go.x2u.in/proxy?email=chris@wegotitems.com&apiKey=c915719b&url=" />
</div>

<button id="loadBtn">Load Data</button>

<div id="status"></div>

<h3>Players</h3>
<table id="playersTable"></table>

<h3>Goalies</h3>
<table id="goaliesTable"></table>

<script>
const els = {
  statsUrl: document.getElementById('statsUrl'),
  proxyPrefix: document.getElementById('proxyPrefix'),
  loadBtn: document.getElementById('loadBtn'),
  status: document.getElementById('status'),
  playersTable: document.getElementById('playersTable'),
  goaliesTable: document.getElementById('goaliesTable')
};

function setStatus(msg) {
  els.status.textContent = msg;
}

function toNumber(v) {
  return Number(String(v).replace(/[^0-9.-]/g, '')) || 0;
}

function normalize(s) {
  return String(s || '').replace(/\s+/g, ' ').trim();
}

function buildUrl() {
  return els.proxyPrefix.value.trim() + encodeURIComponent(els.statsUrl.value.trim());
}

async function loadData() {
  try {
    setStatus('Loading...');

    const url = buildUrl();

    const res = await fetch(url);
    if (!res.ok) throw new Error('Fetch failed');

    const html = await res.text();

    const doc = new DOMParser().parseFromString(html, 'text/html');

    const tables = Array.from(doc.querySelectorAll('table'));

    const players = [];
    const goalies = [];

    tables.forEach(table => {
      const text = normalize(table.innerText);

      if (text.includes('Pts/Game') && text.includes('Goals')) {
        table.querySelectorAll('tr').forEach(tr => {
          const tds = tr.querySelectorAll('td');
          if (tds.length < 10) return;

          const cells = Array.from(tds).map(td => normalize(td.textContent));

          if (!cells[9] || isNaN(toNumber(cells[9]))) return;

          players.push([
            cells[0], cells[1], cells[2],
            cells[3], cells[4], cells[5],
            cells[6], cells[7], cells[8], cells[9]
          ]);
        });
      }

      if (text.includes('Save %') && text.includes('GAA')) {
        table.querySelectorAll('tr').forEach(tr => {
          const tds = tr.querySelectorAll('td');
          if (tds.length < 8) return;

          const cells = Array.from(tds).map(td => normalize(td.textContent));

          if (!cells[6] || isNaN(toNumber(cells[6]))) return;

          goalies.push([
            cells[0], cells[1], cells[2],
            cells[3], cells[4], cells[5],
            cells[6], cells[7]
          ]);
        });
      }
    });

    renderTable(els.playersTable, ['Name','#','Team','GP','Goals','Ass','Hat','Min','Pts/G','Pts'], players);
    renderTable(els.goaliesTable, ['Name','Team','GP','Shots','GA','GAA','Save%','SO'], goalies);

    setStatus('Loaded ' + players.length + ' players / ' + goalies.length + ' goalies');

  } catch (e) {
    console.error(e);
    setStatus('Error: ' + e.message);
  }
}

function renderTable(table, headers, rows) {
  let html = '<tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr>';

  rows.forEach(r => {
    html += '<tr>' + r.map(c => '<td>' + c + '</td>').join('') + '</tr>';
  });

  table.innerHTML = html;
}

els.loadBtn.onclick = loadData;

setStatus('Ready');
</script>

</body>
</html>
