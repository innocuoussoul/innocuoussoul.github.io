<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Event Summaries (Mobile)</title>
  <style>
    :root {
      --bg:#0b1220;
      --card:#121b2e;
      --muted:#9fb0d0;
      --text:#e9f0ff;
      --line:#223055;
      --accent:#6aa2ff;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header {
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(11,18,32,.9);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
    }

    h1 {
      margin:0;
      font-size:16px;
      font-weight:900;
    }

    .wrap {
      max-width:820px;
      margin:0 auto;
      padding:10px 12px 110px;
    }

    .row {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    input {
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#0e1730;
      color:var(--text);
      font-size:13px;
    }

    input.url {
      flex:1;
      min-width:260px;
    }

    button {
      border:0;
      padding:10px 12px;
      border-radius:12px;
      background:var(--accent);
      color:#041022;
      font-weight:900;
      cursor:pointer;
    }

    button.secondary {
      background:transparent;
      color:var(--text);
      border:1px solid var(--line);
    }

    .pill {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
    }

    .err {
      margin-top:10px;
      color:#ffb4b4;
      font-size:13px;
      white-space:pre-wrap;
      padding:10px;
      border:1px solid #3a2a3a;
      border-radius:12px;
      min-height:12px;
    }

    .cards {
      display:grid;
      gap:8px;
      margin-top:12px;
    }

    .dateHeader {
      width:100%;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.03);
      font-weight:900;
      color:var(--text);
      margin-top:6px;
    }

    .card {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
    }

    .card.offHours {
      border-color:#7a2a2a;
      background:linear-gradient(
        180deg,
        rgba(122,42,42,0.25),
        rgba(18,27,46,1) 60%
      );
    }

    .title {
      font-size:15px;
      font-weight:950;
      margin:0;
    }

    .sub {
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      font-weight:700;
      letter-spacing:0.2px;
    }

    footer {
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      padding:10px 14px;
      background:rgba(11,18,32,.94);
      backdrop-filter:blur(8px);
      border-top:1px solid var(--line);
    }

    .footer-inner {
      max-width:820px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .small {
      color:var(--muted);
      font-size:12px;
    }

    code {
      color:var(--text);
    }

    details {
      width:100%;
    }

    details summary {
      list-style:none;
      cursor:pointer;
      width:fit-content;
    }

    details summary::-webkit-details-marker {
      display:none;
    }
  </style>

  <script src="https://js.puter.com/v2/"></script>
</head>
<body>
<header>
  <h1>Event Summaries</h1>
</header>

<div class="wrap">
  <div id="error" class="err"></div>
  <div id="cards" class="cards"></div>
</div>

<footer>
  <div class="footer-inner">
    <div class="row" style="width:100%;">
      <input id="search" placeholder="Search events..." />
      <span class="pill" id="countPill">0</span>
      <span class="pill" id="statusPill">Idle</span>
    </div>

    <details>
      <summary class="pill">Advanced</summary>
      <div class="row" style="margin-top:8px;">
        <input id="url" class="url" />
        <button id="load">Reload</button>
        <button id="stop" class="secondary">Stop</button>
      </div>
    </details>
  </div>
</footer>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  const urlEl = $("url");
  const loadBtn = $("load");
  const stopBtn = $("stop");
  const searchEl = $("search");
  const cardsEl = $("cards");
  const errorEl = $("error");
  const countPill = $("countPill");
  const statusPill = $("statusPill");

  let aborter = null;
  let autoLoaded = false;

  function setStatus(t) {
    statusPill.textContent = t;
  }

  function toLocal(iso) {
    if (!iso) return "";
    try {
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    } catch {
      return iso;
    }
  }

  function timeOnly(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleTimeString([], {
      hour: "numeric",
      minute: "2-digit"
    });
  }

  function dateHeaderLabel(d) {
    return d.toLocaleDateString(undefined, {
      weekday: "short",
      month: "short",
      day: "numeric"
    });
  }

  function indexIncluded(included) {
    const map = new Map();
    if (!Array.isArray(included)) return map;
    for (const r of included) {
      map.set(r.type + ":" + r.id, r);
    }
    return map;
  }

  function getRelData(obj, relName) {
    if (!obj || !obj.relationships) return null;
    const rel = obj.relationships[relName];
    if (!rel) return null;
    return rel.data || null;
  }

  function getIncludedName(includedMap, relData) {
    if (!relData || !relData.type || !relData.id) return "";
    const inc = includedMap.get(relData.type + ":" + relData.id);
    if (!inc || !inc.attributes) return "";
    return inc.attributes.name || "";
  }

  function getResourceName(item, includedMap) {
    let name = getIncludedName(includedMap, getRelData(item, "resource"));
    if (name) return name;

    name = getIncludedName(includedMap, getRelData(item, "resourceArea"));
    if (name) return name;

    return "";
  }

  function pickSummary(item, includedMap) {
    if (!item) return null;
    if (item.type === "event-summaries") return item;

    const rel = getRelData(item, "summary");
    if (rel && rel.type && rel.id) {
      const inc = includedMap.get(rel.type + ":" + rel.id);
      if (inc && inc.type === "event-summaries") return inc;
    }
    return null;
  }

  function buildCard(summaryItem, resourceName) {
    const a = (summaryItem && summaryItem.attributes) ? summaryItem.attributes : {};

    const name = a.name || "(unnamed)";
    const start = a.start_date || "";
    const end = a.end_date || "";
    const registered = a.registered_count;
    const remaining = a.remaining_registration_slots;

    const card = document.createElement("div");
    card.className = "card";

    if (start) {
      const d = new Date(start);
      const hour = d.getHours();
      if (hour < 7 || hour >= 19) {
        card.classList.add("offHours");
      }
    }

    const title = document.createElement("p");
    title.className = "title";
    title.textContent = name;

    const sub = document.createElement("div");
    sub.className = "sub";
    const startTime = timeOnly(start);
    const endTime = timeOnly(end);
    sub.textContent = endTime ? (startTime + "–" + endTime) : startTime;

    const meta = document.createElement("div");
    meta.className = "sub";
    const rr = String(registered) + "/" + String(remaining);
    meta.textContent = (resourceName || "—") + " • " + rr;

    card.appendChild(title);
    card.appendChild(sub);
    card.appendChild(meta);

    card.dataset.search = (name + " " + (resourceName || "")).toLowerCase();
    return card;
  }

  function applySearch() {
    const q = (searchEl.value || "").trim().toLowerCase();
    const cards = Array.from(cardsEl.querySelectorAll(".card"));
    let shown = 0;

    for (const c of cards) {
      const ok = !q || (c.dataset.search || "").includes(q);
      c.style.display = ok ? "" : "none";
      if (ok) shown++;
    }

    countPill.textContent = shown + " shown";

    const headers = Array.from(cardsEl.querySelectorAll(".dateHeader"));
    for (const h of headers) h.style.display = "none";

    let currentHeader = null;
    const children = Array.from(cardsEl.children);
    for (const el of children) {
      if (el.classList && el.classList.contains("dateHeader")) {
        currentHeader = el;
        continue;
      }
      if (el.classList && el.classList.contains("card")) {
        if (el.style.display !== "none" && currentHeader) {
          currentHeader.style.display = "";
        }
      }
    }
  }

  async function waitForPuter(timeoutMs = 4000) {
    const start = Date.now();
    while (Date.now() - start < timeoutMs) {
      if (window.puter && window.puter.net && window.puter.net.fetch) return true;
      await new Promise(function (r) { setTimeout(r, 50); });
    }
    return false;
  }

  async function corsFreeJson(url, abortSignal) {
    if (await waitForPuter(4000)) {
      try {
        const r = await puter.net.fetch(url, {
          method: "GET",
          headers: {
            "Accept": "application/vnd.api+json, application/json;q=0.9, */*;q=0.8"
          }
        });
        return await r.json();
      } catch (e) {
        console.warn("puter.net.fetch failed, falling back to normal fetch:", e);
      }
    }

    const r = await fetch(url, {
      method: "GET",
      signal: abortSignal,
      headers: {
        "Accept": "application/vnd.api+json, application/json;q=0.9, */*;q=0.8"
      },
      cache: "no-store",
      credentials: "omit"
    });

    if (!r.ok) throw new Error("HTTP " + r.status + " " + r.statusText);
    return await r.json();
  }

  function formatDateTime(d, endOfDay) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day + (endOfDay ? " 23:59:59" : " 00:00:00");
  }

  async function getCurrentTeamId() {
    const teamsUrl =
      "https://apps.daysmartrecreation.com/dash/jsonapi/api/v1/teams" +
      "?company=sharks" +
      "&type=teams" +
      "&page[size]=1000" +
      "&filter[product_id]=963";

    const obj = await corsFreeJson(teamsUrl);
    const data = Array.isArray(obj && obj.data) ? obj.data : [];

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const upcoming = data
      .filter(function (team) {
        const a = (team && team.attributes) ? team.attributes : {};
        if (!a.start_date) return false;
        const d = new Date(a.start_date);
        return d >= today;
      })
      .sort(function (a, b) {
        return new Date(a.attributes.start_date) - new Date(b.attributes.start_date);
      });

    if (!upcoming.length) {
      throw new Error("No upcoming team found for product_id=963");
    }

    return upcoming[0].id;
  }

  async function load() {
    errorEl.textContent = "";
    cardsEl.innerHTML = "";
    countPill.textContent = "0 shown";

    aborter?.abort();
    aborter = new AbortController();

    setStatus("Loading…");

    try {
      const teamId = await getCurrentTeamId();

      const today = new Date();
      const startGte = encodeURIComponent(formatDateTime(today, false));

      const end = new Date(today.getFullYear(), 11, 31);
      const endLte = encodeURIComponent(formatDateTime(end, true));

      const url =
        "https://apps.daysmartrecreation.com/dash/jsonapi/api/v1/events" +
        "?cache[save]=false" +
        "&page[size]=250" +
        "&sort=start" +
        "&company=sharks" +
        "&filter[start__gte]=" + startGte +
        "&filter[start__lte]=" + endLte +
        "&filter[resource.facility.my_sam_visible]=true" +
        "&filter[eventType.code__not]=L" +
        "&filter[eventType.code]=k" +
        "&filter[resource.facility.id]=1" +
        "&filterRelations[comments.comment_type]=public" +
        "&include=homeTeam.league.programType%2CvisitingTeam.league.programType%2Csummary%2Cresource.facility%2CresourceArea%2Ccomments%2CeventType" +
        "&filter[hteam_id]=" + encodeURIComponent(teamId);

      urlEl.value = url;

      const obj = await corsFreeJson(url, aborter.signal);
      const includedMap = indexIncluded(obj && obj.included);
      const data = (obj && Array.isArray(obj.data)) ? obj.data : [];

      const todayFloor = new Date();
      todayFloor.setHours(0, 0, 0, 0);

      const upcoming = [];

      for (const item of data) {
        const summary = pickSummary(item, includedMap);
        if (!summary || summary.type !== "event-summaries") continue;

        const a = summary.attributes || {};
        if (!a.start_date) continue;

        const start = new Date(a.start_date);
        if (start < todayFloor) continue;

        const resourceName =
          getResourceName(item, includedMap) ||
          getResourceName(summary, includedMap) ||
          "";

        upcoming.push({
          start: start,
          summary: summary,
          resourceName: resourceName
        });
      }

      upcoming.sort(function (x, y) {
        return x.start - y.start;
      });

      if (!upcoming.length) {
        cardsEl.innerHTML = `<div class="pill">No upcoming events found.</div>`;
        setStatus("Loaded (empty)");
        return;
      }

      const frag = document.createDocumentFragment();
      let lastKey = "";

      for (const e of upcoming) {
        const d = e.start;
        const key = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();

        if (key !== lastKey) {
          lastKey = key;
          const h = document.createElement("div");
          h.className = "dateHeader";
          h.textContent = dateHeaderLabel(d);
          frag.appendChild(h);
        }

        frag.appendChild(buildCard(e.summary, e.resourceName));
      }

      cardsEl.appendChild(frag);

      setStatus("Loaded (" + upcoming.length + ")");
      applySearch();
    } catch (e) {
      setStatus("Error");
      var puterAvailable = !!(window.puter && window.puter.net && window.puter.net.fetch);
      var namePart = (e && e.name) ? (e.name + ": ") : "";
      var msgPart = (e && e.message) ? e.message : String(e);

      errorEl.textContent =
        "Load failed.\n\n" +
        "puter.net.fetch available: " + puterAvailable + "\n" +
        "URL: " + (urlEl.value || "") + "\n\n" +
        namePart + msgPart;
    }
  }

  function autoLoadNow() {
    if (autoLoaded) return;
    autoLoaded = true;
    console.log("Auto-load fired");
    load();
  }

  loadBtn.addEventListener("click", load);
  stopBtn.addEventListener("click", function () {
    aborter?.abort();
    setStatus("Stopped");
  });
  searchEl.addEventListener("input", applySearch);

  window.addEventListener("load", function () {
    setTimeout(autoLoadNow, 800);
  });

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible") {
      setTimeout(autoLoadNow, 200);
    }
  });

  setTimeout(autoLoadNow, 1200);
})();
</script>
</body>
</html>
